<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess.com Sidebar Birthdays</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="birthday-sidebar">
        <div class="sidebar-header">
            <span class="icon">🎂</span>
            <h2>BIRTHDAYS</h2>
        </div>

        <div class="next-birthdays-section">
            <form id="birthday-form">
                <div class="input-row">
                    <input type="text" id="username" placeholder="Username" required>
                    <select id="month" required>
                        <option value="" disabled selected>Mo</option>
                        <option value="0">Jan</option>
                        <option value="1">Feb</option>
                        <option value="2">Mar</option>
                        <option value="3">Apr</option>
                        <option value="4">May</option>
                        <option value="5">Jun</option>
                        <option value="6">Jul</option>
                        <option value="7">Aug</option>
                        <option value="8">Sep</option>
                        <option value="9">Oct</option>
                        <option value="10">Nov</option>
                        <option value="11">Dec</option>
                    </select>
                    <select id="day" required>
                        <option value="" disabled selected>Day</option>
                    </select>
                </div>
                <input type="text" id="note" placeholder="Note (optional)">
                <button type="submit">SAVE BIRTHDAY</button>
            </form>

            <div id="loading-message">Loading birthdays and avatars...</div>

            <div id="birthday-list">
                <!-- Birthday items will be populated by script.js -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
